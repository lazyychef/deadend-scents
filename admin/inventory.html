<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Inventory | DeadEnd Scents Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="admin-shell admin-header compact">
    <a class="admin-logo" href="index.html" aria-label="Admin dashboard"><img src="../assets/deadend-logo.png" alt="DeadEnd Scents"></a>
    <div>
      <p class="eyebrow">Admin V5.1</p>
      <h1>Inventory</h1>
      <p class="muted">Edit remaining mL, sample prices and stock status. Changes write back to Google Sheets.</p>
    </div>
  </header>

  <main class="admin-shell">
    <section class="admin-panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Bottle search</p>
          <h2>Select bottle</h2>
        </div>
        <a class="button" href="index.html">Dashboard</a>
      </div>
      <div class="admin-filter-row">
        <label><span>Search</span><input id="search" type="search" placeholder="House, fragrance or ID"></label>
        <label><span>Collection</span><select id="collectionFilter"><option value="">All</option></select></label>
      </div>
      <div id="inventoryList" class="inventory-edit-list"><div class="empty">Loading catalogue...</div></div>
    </section>

    <section class="admin-panel">
      <p class="eyebrow">Edit bottle</p>
      <h2 id="editTitle">Choose a bottle</h2>
      <p class="muted" id="editMeta">Pick a bottle above to edit its live spreadsheet values.</p>

      <form id="editForm" class="edit-form">
        <input type="hidden" id="editId">
        <div class="form-grid">
          <label><span>Current mL</span><input id="currentMl" type="number" min="0" step="0.1" inputmode="decimal"></label>
          <label><span>Status</span><select id="status"><option>In Stock</option><option>Low Stock</option><option>Ordered</option><option>Out of Stock</option><option>Hidden</option></select></label>
          <label><span>3mL price</span><input id="price3" type="text" placeholder="$8"></label>
          <label><span>5mL price</span><input id="price5" type="text" placeholder="$13"></label>
          <label><span>10mL price</span><input id="price10" type="text" placeholder="$22"></label>
          <label><span>Bottle size mL</span><input id="bottleSize" type="number" min="0" step="1" inputmode="numeric"></label>
          <label><span>Purchase price</span><input id="purchasePrice" type="number" min="0" step="0.01" inputmode="decimal"></label>
          <label><span>Normal RRP</span><input id="normalRrp" type="number" min="0" step="0.01" inputmode="decimal"></label>
        </div>
        <label><span>Admin notes / description</span><textarea id="description" placeholder="Optional description update"></textarea></label>
        <div class="form-actions wide">
          <button class="button primary" type="submit">Save to Google Sheet</button>
          <button class="button" id="reloadBtn" type="button">Reload</button>
        </div>
      </form>
      <p id="saveStatus" class="muted"></p>
    </section>
  </main>

  <script src="admin-write.js"></script>
  <script src="inventory.js"></script>
</body>
</html>
