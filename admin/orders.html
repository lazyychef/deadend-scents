<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Orders | DeadEnd Scents Admin</title><link rel="stylesheet" href="admin.css"></head><body><header class="admin-shell admin-header compact"><a class="admin-logo" href="index.html"><img src="../assets/deadend-logo.png" alt="DeadEnd Scents"></a><div><p class="eyebrow">Admin V2 · Phase 5</p><h1>Orders & Quick Sale</h1><p class="muted">Create, correct, duplicate and manage orders without editing the spreadsheet.</p></div></header><main class="admin-shell"><section class="order-layout"><form id="orderForm" class="admin-panel order-entry"><div class="section-head"><div><p class="eyebrow" id="formMode">Quick Sale</p><h2 id="formTitle">New order</h2></div><button id="cancelEdit" class="button subtle" type="button" hidden>Cancel edit</button></div><div class="form-grid two"><label>Order date<input id="orderDate" type="date" required></label><label>Customer<input id="customer" type="text" placeholder="Customer name" required></label><label>Sales source<select id="salesSource"><option>Facebook</option><option>Instagram</option><option>Website</option><option>Repeat Customer</option><option>Direct</option><option>Other</option></select></label><label>Payment status<select id="paymentStatus"><option>Paid</option><option>Pending</option><option>Refunded</option></select></label></div><div class="product-picker"><label>Search fragrance<input id="productSearch" type="search" placeholder="House or fragrance"></label><div id="productResults" class="picker-results"></div></div><div class="cart-head"><h3>Order items</h3><button id="clearCart" class="button subtle" type="button">Clear</button></div><div id="orderItems" class="order-items"><div class="empty">Search and add a fragrance.</div></div><div class="form-grid three"><label>Postage<input id="postage" type="number" min="0" step="0.01" value="10"></label><label>Discount<input id="discount" type="number" min="0" step="0.01" value="0"></label><label>Order status<select id="orderStatus"><option>New</option><option>Preparing</option><option>Packed</option><option>Posted</option><option>Completed</option></select></label></div><label>Tracking number<input id="trackingNumber" type="text"></label><label>Notes<textarea id="notes" rows="3"></textarea></label><label class="check-line"><input id="deductStock" type="checkbox" checked> Deduct sold mL from current bottle stock</label><div class="order-total"><span>Total</span><strong id="grandTotal">$0.00</strong></div><button id="saveOrder" class="button primary full" type="submit">Save Order</button><p id="saveStatus" class="muted"></p></form><section class="admin-panel order-history"><div class="section-head"><div><p class="eyebrow">History</p><h2>Orders</h2></div><button id="refreshOrders" class="button" type="button">Refresh</button></div><input id="orderSearch" type="search" placeholder="Search customer, ID or status"><div id="ordersList" class="orders-list"><div class="empty">Loading orders...</div></div></section></section></main><dialog id="orderDialog" class="shipping-dialog"><div class="shipping-dialog-shell"><button id="closeOrderDialog" class="shipping-dialog-close" type="button">×</button><div id="orderDetail"></div></div></dialog><script src="admin-write.js"></script><script src="orders.js"></script><script src="admin-shell.js"></script></body></html>
