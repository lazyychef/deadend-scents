<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeadEnd Scents</title>
  <meta name="description" content="Fragrance decants and sample packs from DeadEnd Scents." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="hero">
  <div class="brand">
    <div class="logo">DS</div>
    <div><h1>DeadEnd Scents</h1><p>Fragrance decants. Fresh drops. Easy discovery.</p></div>
  </div>
  <a class="cta" href="#catalogue">Browse samples</a>
</header>
<section class="packs">
  <h2>Sample Packs</h2>
  <div class="pack-grid">
    <button data-pack="night">🌙 Night Out Pack<br><span>sweet, spicy, loud</span></button>
    <button data-pack="fresh">🍋 Fresh & Clean<br><span>daily and office safe</span></button>
    <button data-pack="luxury">✨ Clean Luxury<br><span>premium, polished</span></button>
    <button data-pack="summer">🏝️ Summer Bangers<br><span>bright and fresh</span></button>
  </div>
</section>
<main id="catalogue">
  <div class="toolbar">
    <input id="search" placeholder="Search scent, house, inspiration, vibe…" />
    <select id="status"><option value="">All status</option><option>In stock</option><option>Ordered</option></select>
    <select id="size"><option value="price3">3mL</option><option value="price5">5mL</option><option value="price10">10mL</option></select>
  </div>
  <div id="count"></div>
  <div class="grid" id="grid"></div>
</main>
<aside class="cart">
  <h2>Order List</h2>
  <div id="cartItems">No samples added yet.</div>
  <div class="cart-actions">
    <input id="customer" placeholder="Your name" />
    <button id="copyOrder">Copy order message</button>
    <a id="igLink" href="https://www.instagram.com/" target="_blank">Message on Instagram</a>
  </div>
</aside>
<footer>DeadEnd Scents · Update stock and pricing in <code>data.js</code></footer>
<script src="data.js"></script>
<script src="app.js"></script>
</body></html>
